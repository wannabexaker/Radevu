# Pi-specific override: replace the host-taken :3000 (eye-player-web) with a
# loopback-only :3300 (reached by the shared cloudflared tunnel). !override
# replaces the ports list instead of merging it. Postgres/Redis stay internal.

name: radevu

services:
  web:
    ports: !override
      - "127.0.0.1:3300:3000"
